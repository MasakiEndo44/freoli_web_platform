<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FREOLI — 主案 + 副案 v0.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="freoli-components.jsx"></script>
  <script type="text/babel" src="freoli-sections.jsx"></script>
  <script type="text/babel" src="freoli-final.jsx"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #0a0a0a; }</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Artboard height estimates
    // Mobile  375px: hero(524) + SNS(46) + NL2-mobile(~445)  = 1015 → 1040
    // Desktop 1024px: hero(620) + SNS(58) + NL2-desktop(~352) = 1030 → 1060

    const App = () => (
      <DesignCanvas>

        <DCSection
          id="main"
          title="主案 — アー写前提"
          subtitle="採用: HE-01 Classic Gradient + NextLive-2 日付大型 · プロ撮影アー写（5/24〜25）差し替え待ち"
        >
          <DCArtboard
            id="main-mb"
            label="主案 · Mobile 375px"
            width={375}
            height={1040}
          >
            <PageMobile live={false} />
          </DCArtboard>

          <DCArtboard
            id="main-dt"
            label="主案 · Desktop 1024px"
            width={1024}
            height={1060}
          >
            <PageDesktop live={false} />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="backup"
          title="副案 — ライブ写真前提（フォールバック）"
          subtitle="アー写遅延時に即切り替え · レイアウト・タイポグラフィは主案と完全同一 · 写真のみ差分"
        >
          <DCArtboard
            id="bk-mb"
            label="副案 · Mobile 375px"
            width={375}
            height={1040}
          >
            <PageMobile live={true} />
          </DCArtboard>

          <DCArtboard
            id="bk-dt"
            label="副案 · Desktop 1024px"
            width={1024}
            height={1060}
          >
            <PageDesktop live={true} />
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
